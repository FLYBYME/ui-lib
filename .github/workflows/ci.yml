name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build Library
      run: npm run build

    - name: Build Browser Artifacts
      run: npm run build:browser

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ui-lib-dist
        path: |
          dist/
          package.json
        retention-days: 7
